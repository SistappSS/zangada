              <input className="inp" placeholder="Cole o link aqui…" value={editConfig.musicUrl||""}
                onChange={e=>setEditConfig(p=>({...p,musicUrl:e.target.value}))}/>
            </div>

            {/* Data */}
            {editConfig.widgets?.counter&&(
              <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:16,padding:16,display:"flex",flexDirection:"column",gap:10}}>
                <span style={{fontSize:9.5,fontWeight:800,letterSpacing:".22em",textTransform:"uppercase",color:"rgba(255,255,255,.36)"}}>Data de início do relacionamento</span>
                <input type="date" className="inp" value={editConfig.startDate||""}
                  onChange={e=>setEditConfig(p=>({...p,startDate:e.target.value}))}/>
              </div>
            )}

            {/* Fotos */}
            <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:16,padding:16,display:"flex",flexDirection:"column",gap:10}}>
              <span style={{fontSize:9.5,fontWeight:800,letterSpacing:".22em",textTransform:"uppercase",color:"rgba(255,255,255,.36)"}}>Fotos ({(editConfig.photos||[]).length}/9)</span>
              <input id="edit-fi" type="file" multiple accept="image/*" style={{display:"none"}}
                onChange={async e=>{
                  const files=Array.from(e.target.files||[]).filter(f=>f.type?.startsWith("image/"));
                  const room=9-(editConfig.photos?.length||0);
                  const picked=files.slice(0,Math.max(0,room));
                  const newPhotos=[];
                  for(const file of picked){
                    const r=new FileReader();
                    const b64=await new Promise(res=>{ r.onload=()=>res(r.result.split(",")[1]||""); r.readAsDataURL(file); });
                    newPhotos.push({id:`p_${Date.now()}_${Math.random().toString(36).slice(2,5)}`,url:URL.createObjectURL(file),date:"",_local:true,name:file.name,type:file.type,base64:b64});
                  }
                  setEditConfig(p=>({...p,photos:[...(p.photos||[]),...newPhotos].slice(0,9)}));
                }}/>
              <label htmlFor="edit-fi" style={{display:"flex",alignItems:"center",justifyContent:"center",height:64,border:"2px dashed rgba(255,255,255,.1)",borderRadius:12,cursor:"pointer",fontSize:12,color:"rgba(255,255,255,.4)",gap:8}}>
                <span>📸</span> Adicionar fotos
              </label>
              {(editConfig.photos||[]).length>0&&(
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {(editConfig.photos||[]).map((p,i)=>(
                    <div key={p.id||i} style={{position:"relative"}}>
                      <div style={{width:72,height:60,borderRadius:10,overflow:"hidden",border:"1px solid rgba(255,255,255,.1)"}}>
                        <img src={p.url} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                      </div>
                      <button onClick={()=>setEditConfig(prev=>({...prev,photos:prev.photos.filter((_,j)=>j!==i)}))}
                        style={{position:"absolute",top:-6,right:-6,width:18,height:18,borderRadius:"50%",background:"#ef4444",border:"none",color:"#fff",cursor:"pointer",fontSize:10,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <button onClick={()=>saveEdit()} disabled={!!saving}
              style={{padding:"14px",background:ac,border:"none",borderRadius:14,color:"#fff",fontWeight:900,fontSize:14,cursor:"pointer",opacity:saving?.6:1,boxShadow:`0 6px 24px ${ac}44`}}>
              {saving?"Salvando…":"💾 Salvar alterações"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── Lista de cartões ──
  return(
    <div style={{position:"fixed",inset:0,zIndex:8000,background:"rgba(0,0,0,.82)",backdropFilter:"blur(14px)",display:"flex",flexDirection:"column",overflowY:"auto"}}>
      <div style={{maxWidth:680,width:"100%",margin:"0 auto",padding:"28px 20px 60px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:28}}>
          <div>
            <div style={{fontFamily:"Fraunces,serif",fontSize:26,fontWeight:900}}>Meus Cartões</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginTop:2}}>{user.email}</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.12)",borderRadius:12,padding:"8px 16px",color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>← Fechar</button>
        </div>

        {loading&&<div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,.4)"}}>Carregando…</div>}

        {!loading&&cards.length===0&&(
          <div style={{textAlign:"center",padding:48,background:"rgba(255,255,255,.03)",border:"1px dashed rgba(255,255,255,.1)",borderRadius:20}}>
            <div style={{fontSize:40,marginBottom:12}}>💌</div>
            <div style={{fontFamily:"Fraunces,serif",fontSize:18,fontWeight:700,marginBottom:6}}>Nenhum cartão ainda</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,.4)",marginBottom:20}}>Crie seu primeiro cartão digital!</div>
            <button onClick={onClose} style={{background:accent,border:"none",borderRadius:12,padding:"11px 24px",color:"#fff",fontWeight:900,fontSize:13,cursor:"pointer"}}>Criar cartão</button>
          </div>
        )}

        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {cards.map(card=>{
            const cfg=card.config||{};
            const t=th(cfg);
            const ac=cfg.customAccent||t.accent;
            const editCount=card.edit_count||0;
            const freeLeft=Math.max(0,FREE_EDITS-editCount);
            const paidDate=card.paid_at?new Date(card.paid_at).toLocaleDateString("pt-BR"):"—";
            return(
              <div key={card.id} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:20,overflow:"hidden"}}>
                <div style={{height:4,background:`linear-gradient(90deg,${ac},transparent)`}}/>
                <div style={{padding:"16px 18px"}}>
                  <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12,marginBottom:10}}>
                    <div style={{minWidth:0,flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                        <span style={{fontSize:18}}>{t.icon}</span>
                        <span style={{fontFamily:"Fraunces,serif",fontSize:16,fontWeight:900,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                          {cfg.receiver?`Para ${cfg.receiver}`:`Cartão — ${card.slug}`}
                        </span>
                        <span style={{flexShrink:0,fontSize:9,fontWeight:900,letterSpacing:".12em",textTransform:"uppercase",padding:"2px 8px",borderRadius:99,background:card.published?"rgba(74,222,128,.15)":"rgba(255,255,255,.07)",color:card.published?"#4ade80":"rgba(255,255,255,.4)",border:card.published?"1px solid rgba(74,222,128,.3)":"1px solid rgba(255,255,255,.1)"}}>
                          {card.published?"Publicado":"Rascunho"}
                        </span>
                      </div>
                      <div style={{fontSize:11,color:"rgba(255,255,255,.35)",fontFamily:"Space Mono,monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:4}}>/{card.slug}</div>
                      <div style={{fontSize:11,color:"rgba(255,255,255,.3)"}}>
                        {t.label} · Pago em {paidDate}
                      </div>
                    </div>
                  </div>
                  {/* Barra de edições */}
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,padding:"7px 10px",background:"rgba(255,255,255,.03)",borderRadius:10,border:"1px solid rgba(255,255,255,.06)"}}>
                    <div style={{display:"flex",gap:4}}>
                      {[0,1,2].map(i=>(
                        <div key={i} style={{width:8,height:8,borderRadius:"50%",background:i<editCount?"rgba(248,113,113,.7)":i<FREE_EDITS?"rgba(74,222,128,.5)":"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.1)",transition:"background .2s"}}/>
                      ))}
                    </div>
                    <span style={{fontSize:10,color:"rgba(255,255,255,.4)"}}>
                      {freeLeft>0?`${freeLeft} edição(ões) grátis restante(s)`:"Próxima edição: R$7,99"}
                    </span>
                  </div>

                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {card.published&&(
                      <a href={shareUrlFromSlug(card.slug)} target="_blank"
                        style={{flex:"1 1 auto",minWidth:80,textAlign:"center",padding:"8px 12px",borderRadius:10,background:`${ac}22`,border:`1px solid ${ac}44`,color:ac,fontWeight:800,fontSize:11,textDecoration:"none"}}>
                        🔗 Ver
                      </a>
                    )}
                    <button
                      onClick={()=>{ setEditingCard(card); setEditConfig(normalize(cfg)); setSaveMsg(""); }}
                      style={{flex:"1 1 auto",minWidth:80,padding:"8px 12px",borderRadius:10,background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.12)",color:"#fff",fontWeight:800,fontSize:11,cursor:"pointer"}}>
                      ✏️ Editar
                    </button>
                    <button
                      onClick={()=>deleteCard(card.id,card.slug)}
                      disabled={deleting===card.id}
                      style={{flex:"0 0 auto",padding:"8px 12px",borderRadius:10,background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.25)",color:"#f87171",fontWeight:800,fontSize:11,cursor:"pointer",opacity:deleting===card.id?.5:1}}>
                      {deleting===card.id?"…":"🗑️"}
                    </button>
                    {card.published&&(
                      <button onClick={()=>navigator.clipboard?.writeText(shareUrlFromSlug(card.slug))}
                        style={{flex:"0 0 auto",padding:"8px 12px",borderRadius:10,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",color:"rgba(255,255,255,.6)",fontWeight:800,fontSize:11,cursor:"pointer"}}>
                        📋
                      </button>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

/* hook de sessão */
function useAuth(){
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    if(!sb){ setLoading(false); return; }
    sb.auth.getSession().then(({data})=>{ setUser(data.session?.user||null); setLoading(false); });
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{ setUser(session?.user||null); });
    return()=>subscription.unsubscribe();
  },[]);
  return {user,loading};
}


/* ── EditSuccessPage: volta do Stripe de edição, finaliza o save ── */
const EditSuccessPage=({slug})=>{
  const [status,setStatus]=useState("Confirmando pagamento…");
  const [done,setDone]=useState(false);
  const [err,setErr]=useState("");

  useEffect(()=>{
    let mounted=true;
    async function run(){
      try{
        const params=new URLSearchParams(window.location.search);
        const session_id=params.get("session_id");
        if(!session_id) throw new Error("session_id ausente.");

        // Recupera config salva antes do redirect
        const saved=JSON.parse(localStorage.getItem("lb_edit_v1")||"{}");
        if(!saved.slug) throw new Error("Dados da edição não encontrados. Tente editar novamente.");

        setStatus("Salvando alterações…");

        let authHeader=`Bearer ${SUPABASE_ANON_KEY}`;
        if(sb){
          const {data:sd}=await sb.auth.getSession();
          if(sd?.session?.access_token) authHeader=`Bearer ${sd.session.access_token}`;
        }

        const photos=(saved.photos||[]).slice(0,9).map(p=>({
          id:p.id, url:p.url, date:p.date||null,
          base64:p.base64||"", name:p.name||"photo.jpg",
          contentType:p.type||"image/jpeg", photo_date:p.date||null,
        }));

        const res=await fetch(`${FUNCTIONS_BASE}/save-card`,{
          method:"POST",
          headers:{"content-type":"application/json","apikey":SUPABASE_ANON_KEY,"authorization":authHeader},
          body:JSON.stringify({slug:saved.slug,config:saved.config,photos,session_id}),
        });
        const data=await res.json().catch(()=>({}));
        if(!res.ok) throw new Error(data?.error||"Falha ao salvar.");

        localStorage.removeItem("lb_edit_v1");
        if(!mounted) return;
        setDone(true);
        setStatus("Alterações salvas com sucesso! ✅");
        try{confetti({particleCount:80,spread:60,origin:{y:.6}});}catch(e){}
      }catch(e){
        if(!mounted) return;
        setErr(e.message);
        setStatus("Erro ao salvar");
      }
    }
    run();
    return()=>{ mounted=false; };
  },[]);

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{maxWidth:420,width:"100%",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.09)",borderRadius:18,padding:24}}>
        <div style={{fontFamily:"Fraunces,serif",fontWeight:900,fontSize:22,marginBottom:6}}>{done?"🎉 Salvo!":"⏳ Aguarde…"}</div>
        <div style={{color:err?"#f87171":"rgba(255,255,255,.65)",fontSize:13,marginBottom:14}}>{status}</div>
        {err&&<div style={{background:"rgba(248,113,113,.1)",border:"1px solid rgba(248,113,113,.3)",borderRadius:12,padding:"10px 12px",fontSize:11,color:"#fca5a5",marginBottom:14}}>{err}</div>}
        <div style={{display:"flex",gap:10}}>
          <a href={shareUrlFromSlug(slug)} style={{flex:1,textAlign:"center",padding:"12px",borderRadius:12,background:done?"#fff":"rgba(255,255,255,.09)",color:done?"#07070f":"rgba(255,255,255,.4)",fontWeight:900,textDecoration:"none",pointerEvents:done?"auto":"none"}}>Ver cartão</a>
          <a href={APP_URL} style={{flex:1,textAlign:"center",padding:"12px",borderRadius:12,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.09)",color:"#fff",fontWeight:900,textDecoration:"none"}}>Início</a>
        </div>
      </div>
    </div>
  );
};

const EditCancelPage=({slug})=>(
  <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
    <div style={{maxWidth:420,width:"100%",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.09)",borderRadius:18,padding:24}}>

      <a href={APP_URL} style={{display:"block",textAlign:"center",padding:"12px",borderRadius:12,background:"#fff",color:"#07070f",fontWeight:900,textDecoration:"none"}}>Voltar ao início</a>
    </div>

);


/* ════════════════════════════════════════════════════
   EXTERNAL TEMPLATE PAGE — página pública fullscreen
   para templates externos (ex: Netflix)
════════════════════════════════════════════════════ */
const ExternalTemplatePage=({cfg, tpl})=>{
  const iframeRef = useRef(null);
  const [loaded, setLoaded]   = useState(false);
  const [error, setError]     = useState(false);

  useEffect(()=>{
    if(!loaded || !iframeRef.current) return;
    try{
      iframeRef.current.contentWindow.postMessage(
        { type:"LB_CONFIG", config: cfg },
        window.location.origin
      );
    }catch(e){}
  },[loaded, cfg]);

  if(error) return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,flexDirection:"column",gap:16,background:"#0d0d0d"}}>
      <div style={{fontSize:40}}>⚠️</div>
      <div style={{fontFamily:"Fraunces,serif",fontSize:22,fontWeight:900,color:"#fff"}}>Template indisponível</div>
      <div style={{fontSize:13,color:"rgba(255,255,255,.4)"}}>O arquivo {tpl.file} não foi encontrado.</div>
    </div>
  );

  return(
    <div style={{position:"relative",width:"100%",minHeight:"100vh"}}>
      {!loaded&&(
        <div style={{position:"fixed",inset:0,background:"#0d0d0d",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14,zIndex:10}}>
          <div style={{fontSize:36}}>{tpl.icon}</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,.5)"}}>Carregando {tpl.label}…</div>
        </div>
      )}
      <iframe
        ref={iframeRef}
        src={tpl.file}
        onLoad={()=>setLoaded(true)}
        onError={()=>setError(true)}
        style={{position:"fixed",inset:0,width:"100%",height:"100%",border:"none",display:"block"}}
        title={tpl.label}
        sandbox="allow-scripts allow-same-origin allow-forms"
        allow="autoplay"
      />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
