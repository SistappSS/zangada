function shareUrlFromSlug(slug){ return `${APP_URL}/?c=${encodeURIComponent(slug)}`; }
// Valida URL de vídeo: deve ser .mp4/.webm/.ogg, https, e avisa sobre tamanho
async function validateVideoUrl(url){
  if(!url) return {ok:true};
  if(!/^https?:\/\//i.test(url)) return {ok:false, msg:"Use uma URL https://…"};
  if(!/\.(mp4|webm|ogg)(\?.*)?$/i.test(url)) return {ok:false, msg:"Formato não suportado. Use .mp4, .webm ou .ogg"};
  // HEAD request para verificar tamanho (10 MB = 10_485_760 bytes)
  try{
    const r=await fetch(url,{method:"HEAD",mode:"cors"});
    const size=parseInt(r.headers.get("content-length")||"0");
    if(size>10_485_760) return {ok:false, msg:`Vídeo muito grande (${(size/1e6).toFixed(1)} MB). Máximo: 10 MB.`};
  }catch(e){ /* CORS pode bloquear HEAD — não é erro crítico */ }
  return {ok:true};
}

function safeSlug(s){
  return (s||"").trim().toLowerCase()
    .replace(/\s+/g,"-").replace(/[^a-z0-9\-]/g,"").replace(/\-+/g,"-").slice(0,48);
}
function uid(){ return `p_${Date.now()}_${Math.random().toString(36).slice(2,6)}`; }

// Gera sufixo aleatório curto: 4 chars alfanuméricos (a-z0-9, sem I/O/l/0 para legibilidade)
function randSuffix(){
  const chars="abcdefghjkmnpqrstuvwxyz23456789";
  let s="";for(let i=0;i<4;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}
// Slug com sufixo: "nossa-historia-x7k2"
function slugWithSuffix(base,suffix){ const b=safeSlug(base).slice(0,42)||"cartao"; return `${b}-${suffix}`; }
// Extrai parte legível (sem sufixo)
function slugBase(slug){ const p=slug.split("-"); return p.length>1?p.slice(0,-1).join("-"):slug; }
// Verifica unicidade no Supabase (retorna true se disponível)
async function checkSlugAvailable(slug){
  if(!sb||!slug) return true;
  const {data}=await sb.from("cards").select("id").eq("slug",slug).maybeSingle();
  return !data;
}
function calcTime(d){
  if(!d) return {d:0,h:0,m:0,ok:false};
  const s=new Date(d+"T00:00:00");
  if(isNaN(s)) return {d:0,h:0,m:0,ok:false};
  let dt=Math.max(0,Date.now()-s.getTime());
  const days=Math.floor(dt/86400000); dt-=days*86400000;
  const hrs=Math.floor(dt/3600000); dt-=hrs*3600000;
  return {d:days,h:hrs,m:Math.floor(dt/60000),ok:true};
}
function parseMusic(url){
  if(!url) return null;
  try{
    const u=new URL(url.trim());
    if(u.hostname.includes("spotify.com")){
      const [t,id]=u.pathname.split("/").filter(Boolean);
      if(t && id) return {kind:"spotify",src:`https://open.spotify.com/embed/${t}/${id}?utm_source=generator`};
    }
    if(u.hostname.includes("youtube.com")||u.hostname.includes("youtu.be")){
      const v=u.hostname.includes("youtu.be")?u.pathname.slice(1):u.searchParams.get("v");
      if(v) return {kind:"youtube",src:`https://www.youtube.com/embed/${v}`};
    }
  }catch(e){}
  return null;
}
function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>{ const s=String(r.result||""); resolve(s.split(",")[1]||""); };
    r.onerror=reject;
    r.readAsDataURL(file);
  });
}

/* ── ✅ CORRIGIDO: goToStripeCheckout só recebe slug ── */
async function goToStripeCheckout(slug){
  const res = await fetch(`${FUNCTIONS_BASE}/create-checkout`, {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "apikey": SUPABASE_ANON_KEY,
      "authorization": `Bearer ${SUPABASE_ANON_KEY}`,
    },
    body: JSON.stringify({ slug }),
  });

  const text = await res.text();
  let data = {};
  try { data = JSON.parse(text); } catch {}

  if(!res.ok) throw new Error(data?.error || `HTTP ${res.status}: ${text}`);
  if(!data?.url) throw new Error(data?.error || "Sem url no retorno");

  window.location.href = data.url;
}

function normalize(raw){
  const def={
    templateId:"classic", themeId:"classic", slug:"", customTagline:"", customAccent:"",
    receiver:"", sender:"", message:"", startDate:"", secretMessage:"", musicUrl:"",
    videoUrl:"", videoCaption:"",
    photos:[], galleryStyle:"polaroid",
    rain:{on:true,emoji:"❤️",speed:2,density:2,eset:"love"},
    envelope:{on:true,icon:"💖",title:"Você recebeu um presente",subtitle:"Toque no envelope para abrir ✦"},
    widgets:{gallery:true,counter:true,scratch:true},
    contact:{name:"",email:"",phone:""},
  };
  const c={...def,...(raw||{})};
  if(!["classic","netflix"].includes(c.templateId)) c.templateId="classic";
  c.rain={...def.rain,...(c.rain||{})};
  c.envelope={...def.envelope,...(c.envelope||{})};
  c.widgets={...def.widgets,...(c.widgets||{})};
  c.contact={...def.contact,...(c.contact||{})};
  c.slug=safeSlug(c.slug);
  c.photos=(Array.isArray(c.photos)?c.photos:[])
    .map(p=>{
      if(typeof p==="string") return {id:uid(),url:p,date:""};
      return {id:p.id||uid(),url:p.url,date:p.date||"",name:p.name||"photo.jpg",type:p.type||"image/jpeg",base64:p.base64||"",_local:!!p._local};
    }).filter(p=>p.url);
  if(!THEMES[c.themeId]) c.themeId="classic";

}

/* ── SCRATCH ── */
const Scratch=({message,accent})=>{
  const cv=useRef(null);const[done,setDone]=useState(false);const dn=useRef(false);
  useEffect(()=>{
    const c=cv.current;if(!c)return;
    const ctx=c.getContext("2d",{willReadFrequently:true});
    const r=devicePixelRatio||1;
    c.width=c.clientWidth*r; c.height=c.clientHeight*r;
    ctx.setTransform(r,0,0,r,0,0);
    const w=c.clientWidth,h=c.clientHeight;
    ctx.fillStyle="rgba(10,10,22,.96)"; ctx.fillRect(0,0,w,h);
    const g=ctx.createLinearGradient(0,0,w,h);
    g.addColorStop(0,"rgba(255,255,255,.09)"); g.addColorStop(1,"rgba(255,255,255,.02)");
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
    ctx.fillStyle="rgba(255,255,255,.6)"; ctx.font="700 11px 'DM Sans'"; ctx.textAlign="center";
    ctx.fillText("✦ RASPE AQUI ✦",w/2,h/2+4);
    setDone(false);
  },[message]);
  const sc=(cx,cy)=>{
    const c=cv.current;if(!c)return;
    const r=c.getBoundingClientRect();
    const ctx=c.getContext("2d");
    ctx.globalCompositeOperation="destination-out";
    ctx.beginPath(); ctx.arc(cx-r.left,cy-r.top,20,0,Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation="source-over";
    if(!done){
      const d=ctx.getImageData(0,0,c.width,c.height).data;
      let t=0; for(let i=3;i<d.length;i+=256) if(d[i]===0) t++;
      if(t/(d.length/256)>.4) setDone(true);
    }
  };
  const onD=e=>{dn.current=true;const t=e.touches?.[0];sc(t?.clientX??e.clientX,t?.clientY??e.clientY);};
  const onM=e=>{if(!dn.current)return;const t=e.touches?.[0];sc(t?.clientX??e.clientX,t?.clientY??e.clientY);};
  return(
    <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)",borderRadius:18,overflow:"hidden",position:"relative"}}>
      <div style={{padding:"13px 15px",textAlign:"center"}}>
        <p style={{fontSize:9,letterSpacing:".22em",textTransform:"uppercase",color:"rgba(255,255,255,.4)",fontWeight:700,marginBottom:5}}>Mensagem Secreta</p>
        <p style={{fontSize:12,fontStyle:"italic",color:"rgba(255,255,255,.85)",lineHeight:1.55}}>"{message||"Sua mensagem secreta aqui…"}"</p>
      </div>
      {!done && (
        <div style={{position:"absolute",inset:0,touchAction:"none"}} onMouseDown={onD} onMouseMove={onM} onMouseUp={()=>dn.current=false} onMouseLeave={()=>dn.current=false} onTouchStart={onD} onTouchMove={onM} onTouchEnd={()=>dn.current=false}>
          <canvas ref={cv} style={{width:"100%",height:"100%",display:"block"}}/>
          <div style={{position:"absolute",top:7,right:9,fontSize:8,fontWeight:800,color:accent,background:"rgba(0,0,0,.5)",padding:"3px 7px",borderRadius:20,letterSpacing:".1em"}}>RASPE</div>
        </div>
      )}
    </div>
  );
};

const Carousel=({photos,accent})=>{
  const ref=useRef(null);
  const [active,setActive]=useState(0);
  const list=(photos&&photos.length)?photos:[{id:"ph",url:"",date:""}];
  useEffect(()=>{ setActive(0); if(ref.current) ref.current.scrollTo({left:0,behavior:"auto"}); },[photos?.length]);
  const calcActive=()=>{
    const el=ref.current;if(!el)return;
    const cx=el.scrollLeft+el.clientWidth/2;
    let best=0,bd=Infinity;
    Array.from(el.children).forEach((c,i)=>{ const x=c.offsetLeft+c.clientWidth/2; const d=Math.abs(x-cx); if(d<bd){bd=d;best=i;} });
    setActive(best);
  };
  const go=(i)=>{ const el=ref.current;if(!el)return; const t=el.children[i];if(!t)return; el.scrollTo({left:t.offsetLeft-(el.clientWidth-t.clientWidth)/2,behavior:"smooth"}); };

const PublicPage=({slug})=>{
  const [cfg,setCfg]=useState(null);
  const [loading,setLoading]=useState(true);
  const [particles,setParticles]=useState([]);
  useEffect(()=>{
    let mounted=true;
    async function load(){
      setLoading(true);
      if(!sb){ setCfg({_sb:false}); setLoading(false); return; }
      const {data,error}=await sb.from("cards").select("config,published").eq("slug",slug).single();
      if(!mounted) return;
      if(error||!data?.config){ setCfg({_notfound:true}); setLoading(false); return; }
      if(!data.published){ setCfg({_notpublished:true}); setLoading(false); return; }
      setCfg(normalize(data.config));
      setLoading(false);
    }
    load();
    return()=>{ mounted=false; };
  },[slug]);
  useEffect(()=>{
    if(!cfg||cfg._notfound||cfg._notpublished) return;
    if(!cfg.rain?.on) return;
    const speeds=[4,2.5,2][(cfg.rain.speed||2)-1]||2.5;
    const gap=[1200,800,500][(cfg.rain.density||2)-1]||800;
    const iv=setInterval(()=>{
      const id=Date.now()+Math.random();
      setParticles(p=>[...p,{id,left:Math.random()*100,dur:speeds+Math.random()*2,size:11+Math.random()*12,emoji:cfg.rain.emoji||"❤️"}]);
      setTimeout(()=>setParticles(p=>p.filter(x=>x.id!==id)),7000);
    },gap);
    return()=>clearInterval(iv);
  },[cfg?.rain?.on,cfg?.rain?.emoji,cfg?.rain?.speed,cfg?.rain?.density]);

  if(loading) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,color:"rgba(255,255,255,.7)"}}>Carregando cartão…</div>;
  if(!cfg) return null;
  if(cfg._sb) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,color:"rgba(255,255,255,.7)"}}>Supabase não configurado.</div>;
  if(cfg._notfound) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,color:"rgba(255,255,255,.7)"}}>Cartão não encontrado.</div>;
  if(cfg._notpublished) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,color:"rgba(255,255,255,.7)"}}>Esse link ainda não foi publicado.</div>;
  const th=THEMES[cfg.themeId]||THEMES.classic;
  const ac=cfg.customAccent||th.accent;
  const tpl=TEMPLATES[cfg.templateId]||TEMPLATES.classic;

  if(tpl.external){
    // Template externo: fullscreen iframe que recebe config via postMessage
    return <ExternalTemplatePage cfg={cfg} tpl={tpl}/>;
  }
  return <CardPage cfg={cfg} th={th} ac={ac} particles={particles}/>;
};

/* ── ✅ SUCCESS PAGE — lê session_id da URL e finaliza ── */
const SuccessPage=({slug})=>{
  const [status,setStatus]=useState("Finalizando publicação…");
  const [ready,setReady]=useState(false);
  const [error,setError]=useState("");

  useEffect(()=>{
    let mounted=true;
    async function run(){
      try{
        const params=new URLSearchParams(window.location.search);
        // ✅ session_id vem da success_url que montamos no create-checkout
        const session_id=params.get("session_id");
        if(!session_id) throw new Error("Parâmetro session_id ausente na URL. Verifique a configuração da success_url.");

        const cfg=normalize(JSON.parse(localStorage.getItem("lb_v7")||"{}"));
        if(!cfg.slug) cfg.slug=slug;

        const photos=(cfg.photos||[]).slice(0,9).map(p=>({
          name:p.name||"photo.jpg",
          contentType:p.type||"image/jpeg",
          base64:p.base64||"",
          photo_date:p.date||null
        }));

        setStatus("Confirmando pagamento e publicando…");

        // Pega sessão ativa (se o usuário estiver logado, manda o JWT dele)
        let authHeader = `Bearer ${SUPABASE_ANON_KEY}`;
        try{
          const {data:sessionData}=await sb.auth.getSession();
          if(sessionData?.session?.access_token) authHeader=`Bearer ${sessionData.session.access_token}`;
        }catch(e){}

        const res=await fetch(`${FUNCTIONS_BASE}/finalize-card`,{
          method:"POST",
          headers:{
            "content-type":"application/json",
            "apikey":SUPABASE_ANON_KEY,
            "authorization":authHeader,
          },
          body:JSON.stringify({session_id,slug:safeSlug(slug),config:cfg,photos,contact:cfg.contact||{}}),
        });

        const data=await res.json().catch(()=>({}));
        if(!res.ok) throw new Error(data?.error||"Falha ao finalizar.");

        // Limpa base64 do localStorage
        try{
          const cleaned=normalize(cfg);
          cleaned.photos=(cleaned.photos||[]).map(p=>({...p,base64:"",_local:false}));
          localStorage.setItem("lb_v7",JSON.stringify(cleaned));
        }catch(e){}

        if(!mounted) return;
        setReady(true);
        setStatus("Publicado com sucesso! ✅");
        try{confetti({particleCount:120,spread:70,origin:{y:.6}});}catch(e){}
      }catch(e){
        console.error(e);
        if(!mounted) return;
        setError(e.message||"Erro ao finalizar");
        setStatus("Erro ao publicar");
      }
    }
    run();
    return()=>{ mounted=false; };
  },[slug]);

  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{maxWidth:460,width:"100%",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.09)",borderRadius:18,padding:18}}>
        <div style={{fontFamily:"Fraunces,serif",fontWeight:900,fontSize:22,marginBottom:6}}>{ready?"🎉 Tudo certo!":"⏳ Aguarde…"}</div>
        <div style={{color:error?"#f87171":"rgba(255,255,255,.65)",fontSize:13,marginBottom:14}}>{status}</div>
        {error&&(
          <div style={{background:"rgba(248,113,113,.1)",border:"1px solid rgba(248,113,113,.3)",borderRadius:12,padding:"10px 12px",fontSize:11,color:"#fca5a5",marginBottom:12}}>
            <strong>Detalhe:</strong> {error}
          </div>
        )}
        <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.09)",borderRadius:14,padding:"12px 14px",marginBottom:12}}>
          <div className="sec">Seu link público</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
            <div style={{fontFamily:"Space Mono,monospace",fontSize:11,fontWeight:800,wordBreak:"break-all"}}>{shareUrlFromSlug(slug)}</div>
            <button onClick={()=>navigator.clipboard?.writeText(shareUrlFromSlug(slug))} style={{flexShrink:0,padding:"7px 12px",background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.14)",borderRadius:10,color:"#fff",fontSize:11,fontWeight:800,cursor:"pointer"}}>Copiar</button>
          </div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <a href={shareUrlFromSlug(slug)} style={{flex:1,textAlign:"center",padding:"12px 14px",borderRadius:12,background:ready?"#fff":"rgba(255,255,255,.09)",color:ready?"#07070f":"rgba(255,255,255,.6)",fontWeight:900,textDecoration:"none",pointerEvents:ready?"auto":"none"}}>Abrir cartão</a>
          <a href={APP_URL} style={{flex:1,textAlign:"center",padding:"12px 14px",borderRadius:12,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.09)",color:"#fff",fontWeight:900,textDecoration:"none"}}>Criar outro</a>

/* ── SLUG FIELD — validação de unicidade + sufixo auto ── */
const SlugField=({config,set,accent})=>{
  const [base,setBase]=useState(()=>config.slug?slugBase(config.slug):"");
  const [status,setStatus]=useState("idle"); // idle | checking | ok | taken | empty
  const [suggestion,setSuggestion]=useState("");
  const debounceRef=useRef(null);

  // Inicializa base quando config.slug é preenchido externamente (ex: editar cartão)
  useEffect(()=>{
    if(config.slug && !base) setBase(slugBase(config.slug));
  },[config.slug]);

  // Quando base muda: gera slug com sufixo e valida
  const validate=useCallback(async(rawBase)=>{
    const b=safeSlug(rawBase);
    if(!b){ setStatus("empty"); set("slug",""); return; }
    setStatus("checking");
    // Sempre gera com sufixo — nunca usa base pura
    let found=null;
    for(let i=0;i<10;i++){
      const candidate=slugWithSuffix(b,randSuffix());
      if(await checkSlugAvailable(candidate)){ found=candidate; break; }
    }
    if(found){ set("slug",found); setStatus("ok"); }
    else { setStatus("taken"); }
  },[set]);

  // Gera slug inicial ao montar se vazio
  useEffect(()=>{
    if(!config.slug){
      const b="cartao";
      setBase(b);
      validate(b);
    }
  },[]);

  const handleChange=useCallback((e)=>{
    const raw=e.target.value;
    setBase(raw);
    setStatus("checking");
    clearTimeout(debounceRef.current);
    debounceRef.current=setTimeout(()=>validate(raw),600);
  },[validate]);

  const handleRegen=useCallback(()=>{
    if(!base) return;
    setStatus("checking");
    validate(base);
  },[base,validate]);

  const statusColor = status==="ok"?"#4ade80":status==="taken"||status==="empty"?"#f87171":"rgba(255,255,255,.3)";
  const statusIcon  = status==="ok"?"✓":status==="checking"?"…":status==="taken"?"✗":status==="empty"?"—":"";

  return(
    <div>
      <span className="sec">URL do link</span>
      <div style={{display:"flex",background:"rgba(255,255,255,.05)",border:`1px solid ${status==="ok"?"rgba(74,222,128,.35)":status==="taken"?"rgba(248,113,113,.35)":"rgba(255,255,255,.09)"}`,borderRadius:11,overflow:"hidden",transition:"border-color .2s"}}>
        <span style={{padding:"10px 9px",fontSize:11,color:"rgba(255,255,255,.25)",borderRight:"1px solid rgba(255,255,255,.07)",whiteSpace:"nowrap",display:"flex",alignItems:"center"}}>?c=</span>
        <input className="inp" style={{borderRadius:0,border:"none",background:"transparent",flex:1,fontFamily:"Space Mono,monospace",fontSize:11}}
          placeholder="nome-do-cartao"
          value={base}
          onChange={handleChange}/>
        <button onClick={handleRegen} title="Gerar novo link"
          style={{padding:"0 11px",background:"rgba(255,255,255,.05)",border:"none",borderLeft:"1px solid rgba(255,255,255,.07)",color:"rgba(255,255,255,.4)",cursor:"pointer",fontSize:14,transition:"color .15s"}}
          onMouseEnter={e=>e.currentTarget.style.color="#fff"}
          onMouseLeave={e=>e.currentTarget.style.color="rgba(255,255,255,.4)"}>
          ↻
        </button>
      </div>
      {/* status badge */}
      <div style={{display:"flex",alignItems:"center",gap:6,marginTop:6}}>
        <div style={{display:"flex",alignItems:"center",gap:5,padding:"3px 9px",borderRadius:99,background:status==="ok"?"rgba(74,222,128,.12)":status==="taken"?"rgba(248,113,113,.12)":status==="checking"?"rgba(255,255,255,.06)":"rgba(255,255,255,.04)",border:`1px solid ${status==="ok"?"rgba(74,222,128,.3)":status==="taken"?"rgba(248,113,113,.3)":"rgba(255,255,255,.08)"}`,transition:"all .2s"}}>
          <span style={{fontSize:11,color:statusColor}}>{statusIcon}</span>
          <span style={{fontSize:10,fontWeight:800,color:statusColor,letterSpacing:".06em"}}>
            {status==="ok"?"disponível":status==="taken"?"indisponível":status==="checking"?"verificando…":status==="empty"?"defina um nome":""}
          </span>
        </div>
        {status==="ok"&&config.slug&&(
          <span style={{fontSize:10,fontFamily:"Space Mono,monospace",color:"rgba(255,255,255,.3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>
            ?c={config.slug}
          </span>
        )}
      </div>
      {status==="taken"&&(
        <div style={{marginTop:6,fontSize:11,color:"#f87171",background:"rgba(248,113,113,.08)",borderRadius:8,padding:"6px 10px"}}>
          Não foi possível encontrar uma URL disponível. Tente um nome diferente.
        </div>
      )}
    </div>
  );
};



/* ── VideoUrlField — input com validação ao vivo ── */
const VideoUrlField=({value,onChange})=>{
  const [vStatus,setVStatus]=useState("idle"); // idle|checking|ok|error
  const [vMsg,setVMsg]=useState("");
  const debRef=useRef(null);

  const validate=useCallback(async(url)=>{
    if(!url){ setVStatus("idle"); setVMsg(""); return; }
    setVStatus("checking");
    const res=await validateVideoUrl(url);
    setVStatus(res.ok?"ok":"error");
    setVMsg(res.ok?"":"⚠️ "+res.msg);
  },[]);

  const handleChange=e=>{
    const v=e.target.value.trim();
    onChange(v);
    clearTimeout(debRef.current);
    debRef.current=setTimeout(()=>validate(v),700);
  };

  const borderColor=vStatus==="ok"?"rgba(74,222,128,.4)":vStatus==="error"?"rgba(248,113,113,.4)":"rgba(255,255,255,.09)";

  return(
    <div>
      <input className="inp"
        placeholder="URL do vídeo (.mp4/.webm) ou deixe em branco"
        value={value}
        onChange={handleChange}
        style={{border:`1px solid ${borderColor}`,transition:"border-color .2s"}}/>
      {vStatus==="checking"&&<p style={{fontSize:10,color:"rgba(255,255,255,.35)",marginTop:4}}>Verificando…</p>}
      {vStatus==="ok"&&<p style={{fontSize:10,color:"#4ade80",marginTop:4}}>✓ URL válida</p>}
      {vStatus==="error"&&<p style={{fontSize:10,color:"#f87171",marginTop:4}}>{vMsg}</p>}
    </div>
  );
};

const TemplatePreview=({config,theme,accent,particles})=>{
  const tpl = TEMPLATES[config.templateId] || TEMPLATES.classic;

  if(!tpl.external){
    // Template clássico: usa o Phone existente
    return <Phone config={config} theme={theme} accent={accent} particles={particles}/>;
  }

  // Template externo: iframe com postMessage para passar a config
  const iframeRef = useRef(null);
  const [loaded, setLoaded] = useState(false);
  const [error, setError]   = useState(false);

  // Envia config ao iframe sempre que mudar
  useEffect(()=>{
    if(!loaded || !iframeRef.current) return;
    try{
      iframeRef.current.contentWindow.postMessage(
        { type:"LB_CONFIG", config },
        window.location.origin
      );
    }catch(e){}
  },[loaded, config]);

  return(
    <div className="phone-wrap" style={{position:"relative"}}>
      {!loaded && !error && (
        <div style={{width:320,height:568,borderRadius:36,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}>

  const [config,setConfig]=useState(()=>{
    try{ return normalize(JSON.parse(localStorage.getItem("lb_v7")||"")); }
    catch(e){ return normalize(null); }
  });
  const configRef=useRef(config);
  useEffect(()=>{ configRef.current=config; },[config]);

  const theme=THEMES[config.themeId]||THEMES.classic;
  const accent=config.customAccent||theme.accent;

  useEffect(()=>localStorage.setItem("lb_v7",JSON.stringify(config)),[config]);

  useEffect(()=>{
    if(!config.rain.on) return;
    const speeds=[4,2.5,2][config.rain.speed-1]||2.5;
    const gap=[1200,800,500][config.rain.density-1]||800;
    const iv=setInterval(()=>{
      const id=Date.now()+Math.random();
      setParticles(p=>[...p,{id,left:Math.random()*100,dur:speeds+Math.random()*2,size:11+Math.random()*12,emoji:config.rain.emoji}]);
      setTimeout(()=>setParticles(p=>p.filter(x=>x.id!==id)),7000);
    },gap);
    return()=>clearInterval(iv);
  },[config.rain.on,config.rain.emoji,config.rain.speed,config.rain.density]);

  // Pré-preenche contato se o usuário estiver logado e os campos estiverem vazios
  useEffect(()=>{
    if(!user) return;
    setConfig(p=>{
      const c=p.contact||{};
      if(c.email) return p; // já tem, não sobrescreve
      return {...p,contact:{...c,email:user.email||c.email||"",name:c.name||user.user_metadata?.name||"",phone:c.phone||""}};
    });
  },[user?.id]);

  const set=useCallback((k,v)=>setConfig(p=>({...p,[k]:v})),[]);
  const setR=useCallback((k,v)=>setConfig(p=>({...p,rain:{...p.rain,[k]:v}})),[]);
  const setE=useCallback((k,v)=>setConfig(p=>({...p,envelope:{...p.envelope,[k]:v}})),[]);
  const setW=useCallback(k=>setConfig(p=>({...p,widgets:{...p.widgets,[k]:!p.widgets[k]}})),[]);

  const handleFiles=useCallback(async(files)=>{
    try{
      const list=Array.from(files||[]).filter(f=>f.type?.startsWith("image/"));
      if(!list.length) return;
      const room=9-(configRef.current.photos?.length||0);
      const picked=list.slice(0,Math.max(0,room));
      if(!picked.length) return;
      setStatusMsg("Processando fotos…");
      const newOnes=[];
      for(const file of picked){
        const b64=await fileToBase64(file);
        newOnes.push({id:uid(),url:URL.createObjectURL(file),date:"",_local:true,name:file.name||"photo.jpg",type:file.type||"image/jpeg",base64:b64});
      }
      setConfig(p=>({...p,photos:[...p.photos,...newOnes].slice(0,9)}));
      setStatusMsg("");
    }catch(e){
      console.error(e);
      alert(e.message||"Erro ao processar imagens");
      setStatusMsg("");
    }
  },[]);

  const envIcons=ENV_ICONS.slice(envPage*IPP,(envPage+1)*IPP);
  const STEPS=[{n:1,l:"Visual"},{n:2,l:"Texto"},{n:3,l:"Mídia"},{n:4,l:"Contato"},{n:5,l:"Publicar"}];

  const WTog=({wk,icon,label,sub})=>(
    <div className={`tog${config.widgets[wk]?" on":""}`} onClick={()=>setW(wk)}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:32,height:32,borderRadius:9,background:config.widgets[wk]?`${accent}22`:"rgba(255,255,255,.04)",border:`1px solid ${config.widgets[wk]?accent+"44":"rgba(255,255,255,.07)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,transition:"all .2s"}}>{icon}</div>
        <div><div style={{fontSize:13,fontWeight:800}}>{label}</div><div style={{fontSize:10,color:"rgba(255,255,255,.38)"}}>{sub}</div></div>
      </div>
      <div className={`dot ${config.widgets[wk]?"on":"off"}`}/>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",minHeight:"100vh"}}>
      {showLogin&&<LoginModal onClose={()=>setShowLogin(false)} accent={accent}/>}
      {showMyCards&&user&&<MyCards user={user} accent={accent} onClose={()=>setShowMyCards(false)}/>}

      <nav>
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <div style={{width:28,height:28,borderRadius:8,background:`${accent}22`,border:`1px solid ${accent}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>💌</div>
          <span style={{fontFamily:"Fraunces,serif",fontSize:20,fontWeight:900,letterSpacing:"-.02em"}}>LoveBuilder</span>
          <span style={{fontSize:9,fontWeight:900,letterSpacing:".15em",textTransform:"uppercase",background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.1)",borderRadius:99,padding:"2px 7px",color:"rgba(255,255,255,.5)"}}>BETA</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {user?(
            <>
              <button onClick={()=>setShowMyCards(true)}
                style={{padding:"6px 13px",background:`${accent}22`,border:`1px solid ${accent}44`,borderRadius:99,color:accent,fontSize:11,fontWeight:900,cursor:"pointer"}}>
                💌 Meus cartões
              </button>
              <button onClick={()=>sb.auth.signOut()}
                style={{padding:"6px 11px",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:99,color:"rgba(255,255,255,.5)",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                Sair
              </button>
            </>
          ):(
            <button onClick={()=>setShowLogin(true)}
              style={{padding:"6px 16px",background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.14)",borderRadius:99,color:"#fff",fontSize:11,fontWeight:800,cursor:"pointer"}}>
              Entrar
            </button>
          )}
        </div>
      </nav>

      {/* ── Floating tab: Criar / Visualizar ── */}
      <div id="floating-tab">
        {[["builder","✦ Criar"],["preview","👁 Visualizar"]].map(([v,l])=>(
          <button key={v} className={mv===v?"active":""} onClick={()=>setMv(v)}>{l}</button>
        ))}
      </div>

      {/* ── Floating nav: Voltar / Continuar ── */}
      <div id="floating-nav" style={{display:"flex"}}>
        <button className="btn-back"
          style={{opacity:step===1?.35:1,pointerEvents:step===1?"none":"auto"}}
          onClick={()=>setStep(s=>Math.max(1,s-1))}>← Voltar</button>
        <button className="btn-next"
          onClick={()=>setStep(s=>s<5?s+1:s)}>
          {step<5?"Continuar →":"✓ Pronto"}
        </button>
      </div>

      <div id="mtog"/>

      <div id="layout">
        <div id="builder" style={{display:mv==="builder"?"block":"none"}}>
          <div id="binner">
            <div className="step-bar">
              {STEPS.map(s=>(
                <button key={s.n} className={`step-btn${step===s.n?" active":""}`} onClick={()=>setStep(s.n)}>
                  <span className="step-num">{s.n}</span>{s.l}
                </button>
              ))}
            </div>

            {statusMsg&&(
              <div style={{background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.09)",borderRadius:12,padding:"10px 12px",fontSize:12,color:"rgba(255,255,255,.75)"}}>{statusMsg}</div>
            )}

            {/* STEP 1 */}
            {step===1&&(
              <div className="fadein" style={{display:"flex",flexDirection:"column",gap:20}}>

                {/* ── TEMPLATE SELECTOR ── */}
                <div>
                  <span className="sec">Template</span>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    {Object.values(TEMPLATES).map(tpl=>{
                      const active=config.templateId===tpl.id;
                      return(
                        <div key={tpl.id} onClick={()=>set("templateId",tpl.id)}
                          style={{borderRadius:16,overflow:"hidden",cursor:"pointer",border:`2px solid ${active?tpl.color+"cc":"rgba(255,255,255,.07)"}`,transition:"all .17s",background:active?`${tpl.color}11`:"rgba(255,255,255,.03)"}}>
                          <div style={{height:60,background:tpl.previewBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,position:"relative"}}>
                            {tpl.icon}
                            {active&&<div style={{position:"absolute",top:6,right:8,width:8,height:8,borderRadius:"50%",background:tpl.color,boxShadow:`0 0 6px ${tpl.color}`}}/>}
                          </div>
                          <div style={{padding:"9px 11px"}}>
                            <div style={{fontSize:12,fontWeight:900,color:active?tpl.color:"#fff"}}>{tpl.label}</div>
                            <div style={{fontSize:10,color:"rgba(255,255,255,.35)",marginTop:2,lineHeight:1.3}}>{tpl.desc}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  {config.templateId!=="classic"&&(
                    <div style={{marginTop:8,padding:"8px 11px",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.07)",borderRadius:10,fontSize:10,color:"rgba(255,255,255,.4)",lineHeight:1.5}}>
                      💡 Este template tem campos exclusivos — veja abaixo.
                    </div>
                  )}
                </div>

                {/* ── CAMPOS EXTRAS DO TEMPLATE NETFLIX ── */}
                {config.templateId==="netflix"&&(
                  <div style={{display:"flex",flexDirection:"column",gap:12,padding:"14px",background:"rgba(229,9,20,.06)",border:"1px solid rgba(229,9,20,.2)",borderRadius:16}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                      <span style={{fontSize:16}}>🎬</span>
                      <span style={{fontSize:11,fontWeight:900,color:"#E50914",letterSpacing:".1em",textTransform:"uppercase"}}>Campos Netflix</span>
                    </div>
                    <div>
                      <span className="sec">Vídeo (URL .mp4 ou .webm)</span>
                      <VideoUrlField value={config.videoUrl||""} onChange={v=>set("videoUrl",v)}/>
                    </div>

                  </div>
                )}

                <div>
                  <span className="sec">Tema</span>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                    {Object.values(THEMES).map(t=>(
                      <div key={t.id} className={`tc${config.themeId===t.id?" sel":""}`} onClick={()=>set("themeId",t.id)}>
                        <div style={{height:52,background:t.prev,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{t.icon}</div>
                        <div style={{padding:"7px 9px",background:"rgba(255,255,255,.04)"}}>
                          <div style={{fontSize:10,fontWeight:800}}>{t.label}</div>
                          <div style={{width:14,height:3,background:t.accent,borderRadius:99,marginTop:3,opacity:.8}}/>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                    <span className="sec" style={{margin:0}}>Cor de destaque</span>
                    {config.customAccent&&<button onClick={()=>set("customAccent","")} style={{fontSize:10,color:"rgba(255,255,255,.45)",background:"none",border:"none",cursor:"pointer"}}>↺ padrão</button>}
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
                    {PALETTE.map(c=>(<div key={c} className={`sw${accent===c?" active":""}`} style={{background:c}} onClick={()=>set("customAccent",c===theme.accent?"":c)} title={c}/>))}
                    <div style={{display:"flex",alignItems:"center",gap:6,marginLeft:2}}>
                      <input type="color" value={accent} onChange={e=>set("customAccent",e.target.value)}/>
                      <span style={{fontSize:10,fontFamily:"Space Mono,monospace",color:"rgba(255,255,255,.4)"}}>{accent}</span>
                    </div>
                  </div>
                </div>
                <div>
                  <span className="sec">Texto do tema (tagline)</span>
                  <input className="inp" placeholder={theme.dt} value={config.customTagline} onChange={e=>set("customTagline",e.target.value)}/>
                  <p style={{fontSize:10,color:"rgba(255,255,255,.3)",marginTop:5}}>Vazio = padrão: "{theme.dt}"</p>
                </div>
                <SlugField config={config} set={set} accent={accent}/>
                {/* rain */}
                <div>
                  <span className="sec">Chuva de emojis</span>
                  <div className={`tog${config.rain.on?" on":""}`} onClick={()=>setR("on",!config.rain.on)}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:32,height:32,borderRadius:9,background:config.rain.on?`${accent}22`:"rgba(255,255,255,.04)",border:`1px solid ${config.rain.on?accent+"44":"rgba(255,255,255,.07)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,transition:"all .2s"}}>{config.rain.emoji}</div>
                      <div><div style={{fontSize:13,fontWeight:800}}>Chuva de emojis</div><div style={{fontSize:10,color:"rgba(255,255,255,.38)"}}>Animação de fundo</div></div>
                    </div>
                    <div className={`dot ${config.rain.on?"on":"off"}`}/>
                  </div>
                  <div className={`sub ${config.rain.on?"open":"closed"}`}>
                    <div className="sub-body">
                      <div>
                        <span className="sec">Conjunto</span>
                        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
                          {Object.entries(ESETS).map(([k,v])=>(
                            <button key={k} onClick={()=>setEset(k)} style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${eset===k?"rgba(255,255,255,.4)":"rgba(255,255,255,.08)"}`,background:eset===k?"rgba(255,255,255,.12)":"rgba(255,255,255,.04)",color:eset===k?"#fff":"rgba(255,255,255,.5)",fontSize:10,fontWeight:800,cursor:"pointer",transition:"all .15s"}}>{v.l}</button>
                          ))}
                        </div>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:5}}>
                          {ESETS[eset].e.map(e=>(<div key={e} className={`eb${config.rain.emoji===e?" active":""}`} onClick={()=>setR("emoji",e)}>{e}</div>))}
                        </div>
                      </div>
                      <div>
                        <span className="sec">Emoji personalizado</span>
                        <div style={{display:"flex",gap:8,alignItems:"center"}}>
                          <input className="inp" style={{flex:1}} placeholder="Cole qualquer emoji…" value={config.rain.emoji} onChange={e=>setR("emoji",e.target.value.trim()||"❤️")} maxLength={6}/>
                          <div style={{width:40,height:40,borderRadius:10,background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{config.rain.emoji}</div>
                        </div>
                      </div>
                      <div>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                          <span className="sec" style={{margin:0}}>Velocidade</span>
                          <span style={{fontSize:11,color:"rgba(255,255,255,.45)"}}>{["Devagar","Normal","Rápido"][config.rain.speed-1]}</span>
                        </div>
                        <input type="range" min={1} max={3} step={1} value={config.rain.speed} onChange={e=>setR("speed",+e.target.value)}/>
                      </div>
                      <div>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                          <span className="sec" style={{margin:0}}>Quantidade</span>
                          <span style={{fontSize:11,color:"rgba(255,255,255,.45)"}}>{["Poucos","Normal","Muitos"][config.rain.density-1]}</span>
                        </div>
                        <input type="range" min={1} max={3} step={1} value={config.rain.density} onChange={e=>setR("density",+e.target.value)}/>
                      </div>
                    </div>
                  </div>
                </div>
                {/* envelope */}
                <div>
                  <span className="sec">Envelope de entrada</span>
                  <div className={`tog${config.envelope.on?" on":""}`} onClick={()=>setE("on",!config.envelope.on)}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:32,height:32,borderRadius:9,background:config.envelope.on?`${accent}22`:"rgba(255,255,255,.04)",border:`1px solid ${config.envelope.on?accent+"44":"rgba(255,255,255,.07)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,transition:"all .2s"}}>{config.envelope.icon}</div>
                      <div><div style={{fontSize:13,fontWeight:800}}>Envelope</div><div style={{fontSize:10,color:"rgba(255,255,255,.38)"}}>Tela de abertura</div></div>
                    </div>
                    <div className={`dot ${config.envelope.on?"on":"off"}`}/>
                  </div>
                  <div className={`sub ${config.envelope.on?"open":"closed"}`}>
                    <div className="sub-body">
                      <div>
                        <span className="sec">Ícone do envelope</span>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:5,marginBottom:8}}>
                          {envIcons.map(e=>(<div key={e} className={`eb${config.envelope.icon===e?" active":""}`} style={{fontSize:18}} onClick={()=>setE("icon",e)}>{e}</div>))}
                        </div>
                        <div style={{display:"flex",gap:6}}>
                          <button onClick={()=>setEnvPage(p=>Math.max(0,p-1))} disabled={envPage===0} style={{flex:1,padding:"5px",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.08)",borderRadius:8,color:"#fff",fontSize:11,cursor:"pointer",opacity:envPage===0?.35:1}}>← Anterior</button>
                          <button onClick={()=>setEnvPage(p=>p+1)} disabled={(envPage+1)*IPP>=ENV_ICONS.length} style={{flex:1,padding:"5px",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.08)",borderRadius:8,color:"#fff",fontSize:11,cursor:"pointer",opacity:(envPage+1)*IPP>=ENV_ICONS.length?.35:1}}>Próximos →</button>
                        </div>
                      </div>
                      <div>
                        <span className="sec">Ícone personalizado</span>
                        <div style={{display:"flex",gap:8,alignItems:"center"}}>
                          <input className="inp" style={{flex:1}} placeholder="Cole qualquer emoji…" value={config.envelope.icon} onChange={e=>setE("icon",e.target.value.trim()||"💌")} maxLength={6}/>
                          <div style={{width:40,height:40,borderRadius:10,background:`${accent}18`,border:`1px solid ${accent}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{config.envelope.icon}</div>
                        </div>
                      </div>
                      <div><span className="sec">Título</span><input className="inp" placeholder="Você recebeu um presente" value={config.envelope.title} onChange={e=>setE("title",e.target.value)}/></div>
                      <div><span className="sec">Subtítulo</span><input className="inp" placeholder="Toque no envelope para abrir ✦" value={config.envelope.subtitle} onChange={e=>setE("subtitle",e.target.value)}/></div>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* STEP 2 */}
            {step===2&&(
              <div className="fadein" style={{display:"flex",flexDirection:"column",gap:18}}>
                <div>
                  <span className="sec">Destinatário & remetente</span>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                    <input className="inp" placeholder="Para (nome)" value={config.receiver} onChange={e=>set("receiver",e.target.value)}/>
                    <input className="inp" placeholder="De (nome)" value={config.sender} onChange={e=>set("sender",e.target.value)}/>
                  </div>
                </div>
                <div><span className="sec">Declaração</span><textarea className="inp" placeholder="Escreva sua mensagem…" value={config.message} onChange={e=>set("message",e.target.value)} style={{height:100}}/></div>
                <div>
                  <span className="sec">Widgets</span>
                  <div style={{display:"flex",flexDirection:"column",gap:7}}>
                    <WTog wk="counter" icon="⏱️" label="Contador de tempo" sub="Dias juntos"/>
                    <WTog wk="scratch" icon="🎰" label="Raspadinha secreta" sub="Mensagem surpresa"/>
                  </div>
                </div>
                {config.widgets.counter&&(<div><span className="sec">Data de início</span><input type="date" className="inp" value={config.startDate} onChange={e=>set("startDate",e.target.value)}/></div>)}
                {config.widgets.scratch&&(<div><span className="sec">Mensagem da raspadinha</span><textarea className="inp" placeholder="Sua mensagem secreta…" value={config.secretMessage} onChange={e=>set("secretMessage",e.target.value)} style={{height:80}}/></div>)}
              </div>
            )}

            {/* STEP 3 */}
            {step===3&&(
              <div className="fadein" style={{display:"flex",flexDirection:"column",gap:18}}>
                <div>
                  <span className="sec">Fotos ({config.photos.length}/9)</span>
                  <input id="fi" type="file" multiple accept="image/*" style={{display:"none"}} onChange={e=>handleFiles(e.target.files)}/>
                  <label htmlFor="fi"
                    onDrop={e=>{e.preventDefault();handleFiles(e.dataTransfer.files);}}
                    onDragOver={e=>e.preventDefault()}
                    style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:86,border:"2px dashed rgba(255,255,255,.09)",borderRadius:15,cursor:"pointer",gap:5,transition:"background .2s"}}
                    onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,.04)"}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                  >
                    <span style={{fontSize:22,opacity:.4}}>📸</span>
                    <span style={{fontSize:11,color:"rgba(255,255,255,.35)",fontWeight:700}}>Clique ou arraste (até 9)</span>
                    <span style={{fontSize:10,color:"rgba(255,255,255,.28)"}}>As imagens ficam no rascunho e são enviadas após o pagamento.</span>
                  </label>
                  {config.photos.length>0&&(
                    <div className="hs" style={{display:"flex",gap:10,marginTop:10,overflowX:"auto",paddingBottom:2}}>
                      {config.photos.map(p=>(
                        <div key={p.id} style={{flexShrink:0,width:86}}>
                          <div style={{position:"relative"}}>
                            <div style={{width:86,height:70,borderRadius:12,overflow:"hidden",border:"1px solid rgba(255,255,255,.1)"}}>
                              <img src={p.url} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                            </div>
                            <button onClick={()=>setConfig(prev=>({...prev,photos:prev.photos.filter(x=>x.id!==p.id)}))} style={{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:"50%",background:"#ef4444",border:"none",color:"#fff",cursor:"pointer",fontSize:11,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                          </div>
                          <input type="date" className="inp" value={p.date||""} onChange={e=>{const v=e.target.value;setConfig(prev=>({...prev,photos:prev.photos.map(x=>x.id===p.id?{...x,date:v}:x)}));}} style={{marginTop:6,padding:"7px 9px",fontSize:11}} title="Data da foto"/>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                <div><span className="sec">Música (Spotify ou YouTube)</span><input className="inp" placeholder="Cole o link aqui…" value={config.musicUrl} onChange={e=>set("musicUrl",e.target.value)}/></div>

                <div style={{textAlign:"center",fontSize:10,color:"rgba(255,255,255,.25)",lineHeight:1.7}}>

            <div className="desktop-nav" style={{display:"flex",justifyContent:"space-between",paddingTop:16,borderTop:"1px solid rgba(255,255,255,.07)"}}>
              <button onClick={()=>setStep(s=>Math.max(1,s-1))} style={{padding:"9px 15px",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.09)",borderRadius:10,color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer",opacity:step===1?.3:1,pointerEvents:step===1?"none":"auto"}}>← Voltar</button>
              <button onClick={()=>setStep(s=>s<5?s+1:1)} style={{padding:"9px 19px",background:"#fff",border:"none",borderRadius:10,color:"#07070f",fontWeight:900,fontSize:12,cursor:"pointer"}}>{step<5?"Continuar →":"Editar novamente"}</button>

        <div id="preview" style={{display:mv==="preview"?"flex":"none",flexDirection:"column",alignItems:"center",padding:"28px 16px 48px",background:"radial-gradient(ellipse at 50% 18%,rgba(255,255,255,.025) 0%,transparent 70%)",position:"relative",overflow:"hidden"}}>
          <div className="ring" style={{width:500,height:500}}/>
          <div className="ring" style={{width:820,height:820}}/>
          <div style={{display:"flex",alignItems:"center",gap:7,background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.09)",borderRadius:10,padding:"6px 12px",marginBottom:20}}>
            <span style={{fontSize:14}}>{theme.icon}</span>
            <span style={{fontSize:11,fontWeight:800,color:"rgba(255,255,255,.65)"}}>{theme.label}</span>
            <div style={{width:6,height:6,borderRadius:"50%",background:accent,boxShadow:`0 0 6px ${accent}`}}/>
            <span style={{fontSize:10,color:accent,fontWeight:800}}>{config.customTagline||theme.dt}</span>
          </div>
          <div style={{position:"sticky",top:20,display:"flex",flexDirection:"column",alignItems:"center"}}>
            <TemplatePreview config={config} theme={theme} accent={accent} particles={particles}/>
            <div style={{textAlign:"center",marginTop:10,fontSize:9,color:"rgba(255,255,255,.2)",fontWeight:900,letterSpacing:".12em",textTransform:"uppercase"}}>PRÉVIA AO VIVO</div>

      <style>{`.desktop-nav{display:none}@media(min-width:1024px){.desktop-nav{display:flex!important;border-top:1px solid rgba(255,255,255,.07);padding-top:16px}}`}</style>
    </div>
  );
};


/* ════════════════════════════════════════════════════
   AUTH — Login por OTP (e-mail sem senha)
════════════════════════════════════════════════════ */
const LoginModal=({onClose,accent="#f43f5e"})=>{
  const [email,setEmail]=useState("");
  const [code,setCode]=useState("");
  const [step,setStep]=useState("email"); // email | code
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState("");

  const sendOTP=async()=>{
    if(!email.trim()||!/^[^@]+@[^@]+\.[^@]+$/.test(email)){setMsg("Informe um e-mail válido.");return;}
    setLoading(true);setMsg("");
    // shouldCreateUser:true + emailRedirectTo vazio força OTP numérico (não magic link)
    const {error}=await sb.auth.signInWithOtp({
      email:email.trim(),
      options:{
        shouldCreateUser:true,
        emailRedirectTo: null, // força envio de código, não magic link
      }
    });
    setLoading(false);
    if(error){setMsg("Erro: "+error.message);return;}
    setStep("code");
    setMsg("Código enviado! Verifique sua caixa de entrada (pode cair no spam).");
  };

  const verifyOTP=async()=>{
    if(code.length<8){setMsg("Digite o código de 8 dígitos.");return;}
    setLoading(true);setMsg("");
    const {error}=await sb.auth.verifyOtp({email:email.trim(),token:code.trim(),type:"email"});
    setLoading(false);
    if(error){setMsg("Código inválido ou expirado.");return;}
    onClose();
  };

  return(
    <div style={{position:"fixed",inset:0,zIndex:9000,background:"rgba(0,0,0,.75)",backdropFilter:"blur(12px)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:400,background:"#0e0e1a",border:"1px solid rgba(255,255,255,.12)",borderRadius:22,padding:28}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
          <div>
            <div style={{fontFamily:"Fraunces,serif",fontSize:22,fontWeight:900}}>Entrar</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,.4)",marginTop:2}}>Acesse seus cartões</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,.08)",border:"none",borderRadius:99,width:32,height:32,cursor:"pointer",color:"rgba(255,255,255,.6)",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>

        {step==="email"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div>
              <span className="sec">E-mail</span>
              <input className="inp" type="email" placeholder="seu@email.com" value={email}
                onChange={e=>setEmail(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&sendOTP()}
                autoFocus/>
            </div>
            {msg&&<div style={{fontSize:12,color:msg.startsWith("Erro")||msg.startsWith("Informe")?"#f87171":"#4ade80",background:"rgba(255,255,255,.04)",borderRadius:10,padding:"8px 12px"}}>{msg}</div>}
            <button onClick={sendOTP} disabled={loading} style={{padding:"13px",background:accent,border:"none",borderRadius:13,color:"#fff",fontWeight:900,fontSize:14,cursor:"pointer",opacity:loading?.6:1}}>
              {loading?"Enviando…":"Enviar código →"}
            </button>
          </div>
        )}

        {step==="code"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{fontSize:13,color:"rgba(255,255,255,.55)",background:"rgba(255,255,255,.04)",borderRadius:12,padding:"10px 14px"}}>
              Código enviado para <strong style={{color:"#fff"}}>{email}</strong>
              <button onClick={()=>{setStep("email");setMsg("");setCode("");}} style={{display:"block",marginTop:4,background:"none",border:"none",color:accent,fontSize:11,cursor:"pointer",padding:0,fontWeight:700}}>Trocar e-mail</button>
            </div>
            <div>
              <span className="sec">Código de 8 dígitos</span>
              <input className="inp" type="text" inputMode="numeric" maxLength={8} placeholder="00000000" value={code}
                onChange={e=>setCode(e.target.value.replace(/\D/g,""))}
                onKeyDown={e=>e.key==="Enter"&&verifyOTP()}
                autoFocus style={{fontSize:22,letterSpacing:"0.3em",textAlign:"center"}}/>
            </div>
            {msg&&<div style={{fontSize:12,color:msg.includes("inválido")||msg.includes("Digite")?"#f87171":"#4ade80",background:"rgba(255,255,255,.04)",borderRadius:10,padding:"8px 12px"}}>{msg}</div>}
            <button onClick={verifyOTP} disabled={loading||code.length<8} style={{padding:"13px",background:accent,border:"none",borderRadius:13,color:"#fff",fontWeight:900,fontSize:14,cursor:"pointer",opacity:(loading||code.length<8)?.5:1}}>
              {loading?"Verificando…":"Entrar ✓"}
            </button>
          </div>
        )}

        <div style={{textAlign:"center",marginTop:16,fontSize:10,color:"rgba(255,255,255,.25)"}}>
          Sem senha. Sem cadastro. Só seu e-mail. 🔒
        </div>
      </div>
    </div>
  );
};

/* ════════════════════════════════════════════════════
   MEUS CARTÕES — Dashboard do usuário
════════════════════════════════════════════════════ */
const MyCards=({user,accent,onClose})=>{
  const [cards,setCards]=useState([]);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(null);
  const [deleting,setDeleting]=useState(null);
  const [editingCard,setEditingCard]=useState(null); // card completo em edição
  const [editConfig,setEditConfig]=useState(null);   // config editada
  const [saveMsg,setSaveMsg]=useState("");
  const [showPaywall,setShowPaywall]=useState(false);

  const fetchCards=async()=>{
    setLoading(true);
    const {data,error}=await sb.from("cards")
      .select("id,slug,config,published,paid_at,created_at,edit_count")
      .eq("user_id",user.id)
      .order("created_at",{ascending:false});
    setLoading(false);
    if(!error) setCards(data||[]);
  };
  useEffect(()=>{fetchCards();},[]);

  // ── Salvar edição ──
  const saveEdit=async(sessionId=null)=>{
    if(!editingCard||!editConfig) return;
    setSaving(editingCard.id);
    setSaveMsg("");
    try{
      let authHeader=`Bearer ${SUPABASE_ANON_KEY}`;
      const {data:sd}=await sb.auth.getSession();
      if(sd?.session?.access_token) authHeader=`Bearer ${sd.session.access_token}`;

      // Monta fotos: separa novas (com base64) das existentes (só URL)
      const photos=(editConfig.photos||[]).slice(0,9).map(p=>({
        id:p.id, url:p.url, date:p.date||null,
        base64:p.base64||"", name:p.name||"photo.jpg",
        contentType:p.type||"image/jpeg", photo_date:p.date||null,
      }));

      const res=await fetch(`${FUNCTIONS_BASE}/save-card`,{
        method:"POST",
        headers:{"content-type":"application/json","apikey":SUPABASE_ANON_KEY,"authorization":authHeader},
        body:JSON.stringify({slug:editingCard.slug, config:editConfig, photos, ...(sessionId?{session_id:sessionId}:{})}),
      });
      const data=await res.json().catch(()=>({}));

      if(res.status===402||data.needsPayment){
        setShowPaywall(true);
        setSaving(null);
        return;
      }
      if(!res.ok) throw new Error(data?.error||"Falha ao salvar.");

      if(data.noChange){
        setSaveMsg("✓ Nenhuma alteração detectada — salvo sem consumir edição.");
      } else {
        const rem=Math.max(0,3-data.edit_count);
        setSaveMsg(rem>0?`✓ Salvo! Você ainda tem ${rem} edição(ões) grátis.`:"✓ Salvo! Edições grátis esgotadas — próximas custarão R$7,99.");
      }
      await fetchCards();
      setTimeout(()=>{ setEditingCard(null); setEditConfig(null); setSaveMsg(""); },2200);
    }catch(e){
      setSaveMsg("Erro: "+(e.message||"falha ao salvar"));
    }
    setSaving(null);
  };

  // ── Paywall de edição paga ──
  const goToEditCheckout=async()=>{
    try{
      let authHeader=`Bearer ${SUPABASE_ANON_KEY}`;
      const {data:sd}=await sb.auth.getSession();
      if(sd?.session?.access_token) authHeader=`Bearer ${sd.session.access_token}`;
      const res=await fetch(`${FUNCTIONS_BASE}/create-checkout-edit`,{
        method:"POST",
        headers:{"content-type":"application/json","apikey":SUPABASE_ANON_KEY,"authorization":authHeader},
        body:JSON.stringify({slug:editingCard.slug}),
      });
      const data=await res.json().catch(()=>({}));
      if(!res.ok) throw new Error(data?.error||"Falha");
      // Salva config no localStorage para recuperar após pagamento
      localStorage.setItem("lb_edit_v1",JSON.stringify({slug:editingCard.slug,config:editConfig,photos:(editConfig.photos||[])}));
      window.location.href=data.url;
    }catch(e){ setSaveMsg("Erro: "+e.message); }
  };

  // ── Excluir (via edge function que limpa storage) ──
  const deleteCard=async(id,slug)=>{
    if(!confirm(`Excluir o cartão "${slug}" e todos os arquivos associados? Esta ação não pode ser desfeita.`)) return;
    setDeleting(id);
    try{
      let authHeader=`Bearer ${SUPABASE_ANON_KEY}`;
      const {data:sd}=await sb.auth.getSession();
      if(sd?.session?.access_token) authHeader=`Bearer ${sd.session.access_token}`;
      const res=await fetch(`${FUNCTIONS_BASE}/delete-card`,{
        method:"POST",
        headers:{"content-type":"application/json","apikey":SUPABASE_ANON_KEY,"authorization":authHeader},
        body:JSON.stringify({cardId:id}),
      });
      const data=await res.json().catch(()=>({}));
      if(!res.ok) throw new Error(data?.error||"Falha ao excluir");
      await fetchCards();
    }catch(e){ alert("Erro ao excluir: "+e.message); }
    setDeleting(null);
  };

  const th=(cfg)=>THEMES[cfg?.themeId]||THEMES.classic;
  const FREE_EDITS=3;

  // ── Tela de edição ──
  if(editingCard&&editConfig){
    const editCount=editingCard.edit_count||0;
    const freeLeft=Math.max(0,FREE_EDITS-editCount);
    const ac=editConfig.customAccent||(THEMES[editConfig.themeId]||THEMES.classic).accent;

    return(
      <div style={{position:"fixed",inset:0,zIndex:8000,background:"rgba(0,0,0,.9)",backdropFilter:"blur(14px)",display:"flex",flexDirection:"column",overflowY:"auto"}}>
        {showPaywall&&(
          <div style={{position:"fixed",inset:0,zIndex:9500,background:"rgba(0,0,0,.85)",backdropFilter:"blur(10px)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
            <div style={{maxWidth:400,width:"100%",background:"#0e0e1a",border:"1px solid rgba(255,255,255,.12)",borderRadius:22,padding:28,textAlign:"center"}}>
              <div style={{fontSize:36,marginBottom:12}}>🔒</div>
              <div style={{fontFamily:"Fraunces,serif",fontSize:22,fontWeight:900,marginBottom:8}}>Edições grátis esgotadas</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,.5)",marginBottom:20,lineHeight:1.6}}>
                Você usou suas 3 edições grátis neste cartão.<br/>
                Esta edição custa <strong style={{color:"#fff"}}>R$7,99</strong>.
              </div>
              <button onClick={goToEditCheckout}
                style={{width:"100%",padding:"14px",background:ac,border:"none",borderRadius:13,color:"#fff",fontWeight:900,fontSize:15,cursor:"pointer",marginBottom:10}}>
                💳 Pagar R$7,99 e salvar
              </button>
              <button onClick={()=>setShowPaywall(false)}
                style={{width:"100%",padding:"11px",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:13,color:"rgba(255,255,255,.6)",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                Cancelar
              </button>
            </div>
          </div>
        )}

        <div style={{maxWidth:680,width:"100%",margin:"0 auto",padding:"28px 20px 60px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
            <button onClick={()=>{setEditingCard(null);setEditConfig(null);setSaveMsg("");}}
              style={{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.1)",borderRadius:10,padding:"7px 14px",color:"rgba(255,255,255,.7)",fontWeight:700,fontSize:12,cursor:"pointer"}}>
              ← Voltar
            </button>
            <div style={{flex:1}}>
              <div style={{fontFamily:"Fraunces,serif",fontSize:18,fontWeight:900}}>Editando: {editingCard.slug}</div>
              <div style={{fontSize:11,color:freeLeft>0?"#4ade80":"#f87171",marginTop:2}}>
                {freeLeft>0?`${freeLeft} edição(ões) grátis restante(s)`:"Edições grátis esgotadas — próxima custa R$7,99"}
              </div>
            </div>
            <button onClick={()=>saveEdit()} disabled={!!saving}
              style={{padding:"10px 22px",background:ac,border:"none",borderRadius:12,color:"#fff",fontWeight:900,fontSize:13,cursor:"pointer",opacity:saving?.6:1,boxShadow:`0 4px 18px ${ac}44`}}>
              {saving?"Salvando…":"💾 Salvar alterações"}
            </button>
          </div>

          {saveMsg&&(
            <div style={{background:saveMsg.startsWith("Erro")?"rgba(248,113,113,.1)":"rgba(74,222,128,.1)",border:`1px solid ${saveMsg.startsWith("Erro")?"rgba(248,113,113,.3)":"rgba(74,222,128,.3)"}`,borderRadius:12,padding:"10px 14px",fontSize:12,color:saveMsg.startsWith("Erro")?"#f87171":"#4ade80",marginBottom:16}}>
              {saveMsg}
            </div>
          )}

          {/* Campos editáveis */}
          <div style={{display:"flex",flexDirection:"column",gap:14}}>

            {/* Tema */}
            <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:16,padding:16}}>
              <span style={{fontSize:9.5,fontWeight:800,letterSpacing:".22em",textTransform:"uppercase",color:"rgba(255,255,255,.36)",display:"block",marginBottom:10}}>Tema</span>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                {Object.values(THEMES).map(t=>(
                  <div key={t.id} onClick={()=>setEditConfig(p=>({...p,themeId:t.id}))}
                    style={{borderRadius:12,overflow:"hidden",cursor:"pointer",border:`2px solid ${editConfig.themeId===t.id?"rgba(255,255,255,.65)":"rgba(255,255,255,.07)"}`,transition:"border-color .15s"}}>
                    <div style={{height:40,background:t.prev,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{t.icon}</div>
                    <div style={{padding:"5px 8px",background:"rgba(255,255,255,.04)",fontSize:10,fontWeight:800}}>{t.label}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Destinatários */}
            <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:16,padding:16,display:"flex",flexDirection:"column",gap:10}}>
              <span style={{fontSize:9.5,fontWeight:800,letterSpacing:".22em",textTransform:"uppercase",color:"rgba(255,255,255,.36)"}}>Destinatário & remetente</span>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <input className="inp" placeholder="Para (nome)" value={editConfig.receiver||""}
                  onChange={e=>setEditConfig(p=>({...p,receiver:e.target.value}))}/>
                <input className="inp" placeholder="De (nome)" value={editConfig.sender||""}
                  onChange={e=>setEditConfig(p=>({...p,sender:e.target.value}))}/>
              </div>
            </div>

            {/* Tagline / Link */}
            <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:16,padding:16,display:"flex",flexDirection:"column",gap:10}}>
              <span style={{fontSize:9.5,fontWeight:800,letterSpacing:".22em",textTransform:"uppercase",color:"rgba(255,255,255,.36)"}}>Tagline & link</span>
              <input className="inp" placeholder="Tagline personalizada" value={editConfig.customTagline||""}
                onChange={e=>setEditConfig(p=>({...p,customTagline:e.target.value}))}/>
              <div style={{display:"flex",background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.09)",borderRadius:11,overflow:"hidden"}}>
                <span style={{padding:"10px 11px",fontSize:11,color:"rgba(255,255,255,.3)",borderRight:"1px solid rgba(255,255,255,.07)",display:"flex",alignItems:"center",whiteSpace:"nowrap"}}>?c=</span>
                <input className="inp" style={{borderRadius:0,border:"none",background:"transparent",flex:1}} placeholder="seu-link"
                  value={editConfig.slug||""}
                  onChange={e=>setEditConfig(p=>({...p,slug:safeSlug(e.target.value)}))}/>
              </div>
            </div>

            {/* Declaração */}
            <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:16,padding:16,display:"flex",flexDirection:"column",gap:10}}>
              <span style={{fontSize:9.5,fontWeight:800,letterSpacing:".22em",textTransform:"uppercase",color:"rgba(255,255,255,.36)"}}>Declaração & mensagem secreta</span>
              <textarea className="inp" placeholder="Sua mensagem…" value={editConfig.message||""}
                onChange={e=>setEditConfig(p=>({...p,message:e.target.value}))} style={{height:90}}/>
              <textarea className="inp" placeholder="Mensagem da raspadinha…" value={editConfig.secretMessage||""}

            </div>

            {/* Música */}
            <div style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:16,padding:16,display:"flex",flexDirection:"column",gap:10}}>
